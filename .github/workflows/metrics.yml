name: Metrics — Starlists

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  starlists:
    name: Render starlists SVG
    runs-on: ubuntu-latest
    steps:
      - name: Generate starlists metrics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.starlists.svg
          token: ${{ secrets.PERSONAL_TOKEN }}
          user: G-Jin12

          base: ""
          template: classic

          # ── Q2 반영: 표시할 리스트 3개, 각 리스트당 저장소 2개 ──
          plugin_starlists: yes
          plugin_starlists_limit: 3                    # 별표 컬렉션 3개
          plugin_starlists_limit_repositories: 2       # 각 컬렉션 안에서 2개씩
          plugin_starlists_languages: yes
          plugin_starlists_shuffle_repositories: no    # 고정된 항목 표시

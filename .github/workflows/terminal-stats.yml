name: Update Terminal GitHub Stats

on:
  schedule:
    - cron: "47 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-terminal-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Checkout terminal stats generator
        uses: actions/checkout@v4
        with:
          repository: yogeshwaran01/github-stats-terminal-style
          path: terminal-generator

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: terminal-generator
        run: npm install

      - name: Copy terminal config
        run: |
          mkdir -p terminal-generator/terminalConfigs
          cp terminalConfigs/profile.json terminal-generator/terminalConfigs/profile.json

      - name: Generate terminal SVG
        working-directory: terminal-generator
        env:
          GHT: ${{ secrets.GHT }}
        run: |
          npm run build || true
          GHT=${{ secrets.GHT }} npx ts-node bin/github-stats-terminal.ts --bulk

      - name: Copy SVG to profile repository
        run: |
          cp terminal-generator/terminals/profile.svg github_stats.svg || cp terminal-generator/github_stats.svg github_stats.svg

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update terminal GitHub stats"
          file_pattern: github_stats.svg
